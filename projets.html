<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Projets</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
        <link href="css/base.css" rel="stylesheet"/>
        <link href="css/header.css" rel="stylesheet"/>
        <link href="css/index.css" rel="stylesheet"/>
        <script language="javascript" src="script/template.js"></script>
        <style>
            .v-center {
                display: flex;
                align-items: center;
            }

            .text-size {
                font-size: 24px;
            }

            .netfloux{
                width: 100%;
                height: auto;
            }
        </style>
    </head>
    
    <body>
        <main>
            <div class="container" id="menu"></div>
        </main>

        <div class="b-example-divider"></div>

        <main class="px-3">
            <div class="container px-4 py-5">
                <h2 class="pb-2 border-bottom" id="perso_projet_title"></h2>
                <p class="text-size" id="perso_projet_description"></p>
            </div>
        </main>

        <div class="b-example-divider"></div>

        <main class="px-3">
            <div class="container px-4 py-5" id="netfloux">
                <h2 class="pb-2 border-bottom">Netfloux</h2>
                <div class="row">
                    <div class="col-md-6 v-center">
                        <img class="netfloux" src="assets/projets/netfloux.png" alt="capture d'écran du site"/>
                    </div>
                    <div class="col-md-6 v-center">
                        <p class="text-size" id="netfloux_description"></p>
                    </div>
                </div>
            </div>
        </main>

        <div class="b-example-divider"></div>

        <main class="px-3">
            <div class="container px-4 py-5" id="argus_online">
                <h2 class="pb-2 border-bottom">Argus Online</h2>
                <div class="row">
                    <div class="col-md-6 v-center">
                        <p class="text-size" id="argus_description"></p>
                    </div>
                    <div class="col-md-6 v-center">
                        <img class="netfloux" src="assets/projets/argus.png" alt="capture d'écran du site"/>
                    </div>
                </div>
            </div>
        </main>

        <div class="b-example-divider"></div>

        <div class="container">
            <footer class="py-5" id="footer"></footer>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    </body>
</html>
